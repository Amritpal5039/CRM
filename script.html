<script>
  let currentUser = null;
  let currentUsername = null;
  let isCurrentUserAdmin = false;
  let dashboardChartInstance = null;
  let trendChartInstance = null;
  let sourceChartInstance = null;
  let leadByChartInstance = null;
  let currentDetailRowIndex = null;

  // Login
  function handleLogin(event) {
    event.preventDefault();
    const btn = document.getElementById('login-btn');
    const msgDiv = document.getElementById('login-message');
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Logging in...';
    msgDiv.style.display = 'none';

    google.script.run
      .withSuccessHandler(function(response) {
        if (response.success) {
          currentUser = response.name;
          currentUsername = user; // store the raw username
          isCurrentUserAdmin = response.isAdmin;
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('app-container').style.display = 'flex';
          document.getElementById('logged-in-user').textContent = 'Logged in as: ' + currentUser + (isCurrentUserAdmin ? ' (Admin)' : '');
          
          // Defaults for dashboard
          const today = new Date();
          const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
          document.getElementById('dash-end-date').valueAsDate = today;
          document.getElementById('dash-start-date').valueAsDate = firstDay;
          
          fetchDashboardStats();
        } else {
          msgDiv.style.display = 'block';
          msgDiv.textContent = response.message;
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      })
      .withFailureHandler(function(error) {
        msgDiv.style.display = 'block';
        msgDiv.textContent = 'Error: ' + error.message;
        btn.disabled = false;
        btn.textContent = 'Login';
      })
      .login(user, pass);
  }

  function logout() {
    currentUser = null;
    currentUsername = null;
    isCurrentUserAdmin = false;
    document.getElementById('login-form').reset();
    document.getElementById('app-container').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    // On mobile, toggle 'open' class for off-canvas menu
    if (window.innerWidth <= 768) {
      sidebar.classList.toggle('open');
    } else {
      // On desktop, toggle 'collapsed' class
      sidebar.classList.toggle('collapsed');
    }
  }

  function showSection(sectionId, element) {
    document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
    
    if (element) {
      document.querySelectorAll('.nav-links li').forEach(li => li.classList.remove('active'));
      element.classList.add('active');
    }
    closeUserDetail();

    // Auto-close sidebar on mobile after clicking a link
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.remove('open');
    }
  }

  // --- Dashboard ---
  function fetchDashboardStats() {
    const start = document.getElementById('dash-start-date').value;
    const end = document.getElementById('dash-end-date').value;
    
    google.script.run
      .withSuccessHandler(function(stats) {
        renderChart(stats);
        renderTrendChart(stats.timeline);
        renderSourceChart(stats.sources);
        renderLeadByChart(stats.leadBy);
      })
      .getDashboardStats(start, end);
  }

  function renderChart(stats) {
    const ctx = document.getElementById('dashboardChart').getContext('2d');

    const labels = ['Total', 'No Reg', 'With Reg', 'Pending', 'Follow Up', 'Not Int', 'Closed', 'No Ans', 'Gen Inq', 'Dropped', 'Pat Will Cont'];
    const data = [
      stats.total,
      stats.confirmedWithoutReg,
      stats.confirmedWithReg,
      stats.pending,
      stats.followUp,
      stats.notInterested,
      stats.closed,
      stats.callNotAnswered,
      stats.generalInquiry,
      stats.callDropped,
      stats.patientWillContact
    ];
    const bgColors = ['#006A7F', '#34c759', '#2e7d32', '#fbbc04', '#4285f4', '#ea4335', '#9e9e9e', '#ffb74d', '#00bcd4', '#e53935', '#8e24aa'];

    if (dashboardChartInstance) dashboardChartInstance.destroy();

    dashboardChartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Leads',
          data: data,
          backgroundColor: bgColors
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          title: { display: true, text: 'Lead Status Overview' }
        },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1 } }
        }
      }
    });
  }

  function renderTrendChart(timeline) {
    const ctx = document.getElementById('trendChart').getContext('2d');
    const labels = Object.keys(timeline);
    const totalData = labels.map(l => timeline[l].total);
    const confirmedWithRegData = labels.map(l => timeline[l].confirmedWithReg);

    if (trendChartInstance) trendChartInstance.destroy();

    trendChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: 'Total Enquiries', data: totalData, borderColor: '#006A7F', backgroundColor: 'rgba(0,106,127,0.1)', fill: true, tension: 0.3 },
          { label: 'Confirmed (With Reg ID)', data: confirmedWithRegData, borderColor: '#34c759', backgroundColor: 'rgba(52,199,89,0.1)', fill: true, tension: 0.3 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          title: { display: true, text: 'Enquiries vs Confirmed (Reg) Trend' }
        },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
      }
    });
  }

  function renderSourceChart(sources) {
    const ctx = document.getElementById('sourceChart').getContext('2d');
    const labels = Object.keys(sources);
    const data = labels.map(l => sources[l]);

    const bgColors = [
      '#006A7F', '#34c759', '#fbbc04', '#ea4335', '#4285f4',
      '#8e24aa', '#f06292', '#4dd0e1', '#4db6ac', '#aed581',
      '#ffb74d', '#ba68c8', '#4dd0e1', '#dce775', '#a1887f'
    ];

    if (sourceChartInstance) sourceChartInstance.destroy();

    sourceChartInstance = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: bgColors.slice(0, labels.length)
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom' },
          title: { display: true, text: 'Lead Sources' }
        }
      }
    });
  }

  function renderLeadByChart(leadByData) {
    const ctx = document.getElementById('leadByChart').getContext('2d');
    const labels = Object.keys(leadByData);
    const data = labels.map(l => leadByData[l]);

    const bgColors = ['#4285f4', '#34a853', '#fbbc04', '#ea4335', '#8e24aa'];

    if (leadByChartInstance) leadByChartInstance.destroy();

    leadByChartInstance = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: bgColors.slice(0, labels.length)
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom' },
          title: { display: true, text: 'Leads by Medium' }
        }
      }
    });
  }

  // --- All Leads ---
  function toggleRegFilter() {
    const statusVal = document.getElementById('al-filter-status').value;
    const regFilterGroup = document.getElementById('al-reg-filter-group');
    if (statusVal === 'Confirmed') {
      regFilterGroup.style.display = 'flex';
    } else {
      regFilterGroup.style.display = 'none';
      document.getElementById('al-filter-reg').value = '';
    }
  }

  function clearAllLeadsFilters() {
    document.getElementById('al-filter-name').value = '';
    document.getElementById('al-filter-phone').value = '';
    document.getElementById('al-filter-city').value = '';
    document.getElementById('al-filter-start').value = '';
    document.getElementById('al-filter-end').value = '';
    document.getElementById('al-filter-sort').value = 'fresh';
    document.getElementById('al-filter-status').value = 'Pending';
    toggleRegFilter();
    fetchAllLeads(1);
  }

  function fetchAllLeads(page) {
    const params = {
      name: document.getElementById('al-filter-name').value,
      phone: document.getElementById('al-filter-phone').value,
      city: document.getElementById('al-filter-city').value,
      startDate: document.getElementById('al-filter-start').value,
      endDate: document.getElementById('al-filter-end').value,
      status: document.getElementById('al-filter-status').value,
      regIdFilter: document.getElementById('al-filter-status').value === 'Confirmed' ? document.getElementById('al-filter-reg').value : null,
      sortOrder: document.getElementById('al-filter-sort').value,
      page: page
    };
    
    document.getElementById('al-loading').style.display = 'block';
    document.getElementById('al-list').innerHTML = '';
    document.getElementById('al-pagination').innerHTML = '';

    google.script.run
      .withSuccessHandler(function(response) {
        document.getElementById('al-loading').style.display = 'none';
        renderLeadsList('al-list', response.leads);
        renderPagination('al-pagination', response.currentPage, response.totalPages, 'fetchAllLeads');
      })
      .getFilteredLeads(params);
  }

  // --- Today Calls ---
  function clearTodayCallsFilters() {
    document.getElementById('tc-filter-name').value = '';
    document.getElementById('tc-filter-phone').value = '';
    document.getElementById('tc-filter-city').value = '';
    document.getElementById('tc-filter-sort').value = 'fresh';
    fetchTodayCalls(1);
  }

  function fetchTodayCalls(page) {
    const params = {
      name: document.getElementById('tc-filter-name').value,
      phone: document.getElementById('tc-filter-phone').value,
      city: document.getElementById('tc-filter-city').value,
      status: document.getElementById('tc-filter-status').value,
      sortOrder: document.getElementById('tc-filter-sort').value,
      isTodayOnly: true,
      page: page
    };
    
    document.getElementById('tc-loading').style.display = 'block';
    document.getElementById('tc-list').innerHTML = '';
    document.getElementById('tc-pagination').innerHTML = '';

    google.script.run
      .withSuccessHandler(function(response) {
        document.getElementById('tc-loading').style.display = 'none';
        renderLeadsList('tc-list', response.leads);
        renderPagination('tc-pagination', response.currentPage, response.totalPages, 'fetchTodayCalls');
      })
      .getFilteredLeads(params);
  }

  // --- Shared List Render ---
  function renderLeadsList(containerId, leads) {
    const container = document.getElementById(containerId);
    if (leads.length === 0) {
      container.innerHTML = '<p style="color:var(--text-light)">No records found matching criteria.</p>';
      return;
    }

    let html = '';
    leads.forEach(lead => {
      let regIdHtml = lead.registrationId ? `<span><span class="material-icons">badge</span> ${lead.registrationId}</span>` : '';
      html += `
        <div class="lead-item">
          <div class="lead-info">
            <span class="lead-name" onclick="openUserDetail(${lead.rowIndex})">${lead.name}</span>
            <div class="lead-meta">
              <span><span class="material-icons">phone</span> <a href="tel:${lead.phone}" style="color: inherit; text-decoration: none;">${lead.phone}</a></span>
              <span><span class="material-icons">location_on</span> ${lead.city}</span>
              <span><span class="material-icons">calendar_today</span> ${lead.enquiryDate}</span>
              <span><span class="material-icons">flag</span> ${lead.status || 'Pending'}</span>
              ${regIdHtml}
            </div>
            <div style="margin-top: 5px; font-size: 13px; color: var(--text-light);">
              <strong>Latest Note:</strong> ${lead.latestConversation}
            </div>
          </div>
          <div class="lead-actions" style="margin-left: 15px;">
            <a href="tel:${lead.phone}" class="btn btn-primary" style="display: inline-flex; align-items: center; justify-content: center; padding: 10px; border-radius: 50%;">
              <span class="material-icons" style="font-size: 20px; margin: 0;">call</span>
            </a>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  function renderPagination(containerId, currentPage, totalPages, fetchFuncStr) {
    if (totalPages <= 1) return;
    const container = document.getElementById(containerId);
    let html = '';
    
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="${fetchFuncStr}(${currentPage - 1})">Prev</button>`;
    
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="${fetchFuncStr}(${i})">${i}</button>`;
      } else if (i === currentPage - 3 || i === currentPage + 3) {
        html += `<span style="padding: 6px;">...</span>`;
      }
    }
    
    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="${fetchFuncStr}(${currentPage + 1})">Next</button>`;
    
    container.innerHTML = html;
  }

  // --- User Detail View (Overlay) ---
  function openUserDetail(rowIndex) {
    currentDetailRowIndex = rowIndex;
    document.getElementById('user-detail-overlay').style.display = 'flex';
    document.getElementById('ud-body').innerHTML = '<div class="loading">Loading details...</div>';
    document.getElementById('ud-name').textContent = 'Loading...';

    google.script.run
      .withSuccessHandler(renderUserDetail)
      .getUserDetails(rowIndex);
  }

  function closeUserDetail() {
    document.getElementById('user-detail-overlay').style.display = 'none';
    currentDetailRowIndex = null;
    // Refresh current visible list to reflect any changes
    if (document.getElementById('all-leads-section').classList.contains('active')) {
      fetchAllLeads(document.querySelector('#al-pagination .active') ? parseInt(document.querySelector('#al-pagination .active').textContent) : 1);
    } else if (document.getElementById('today-calls-section').classList.contains('active')) {
      fetchTodayCalls(document.querySelector('#tc-pagination .active') ? parseInt(document.querySelector('#tc-pagination .active').textContent) : 1);
    }
  }

  function renderUserDetail(user) {
    document.getElementById('ud-name').textContent = user.name;
    document.getElementById('ud-name').setAttribute('data-original-name', user.name);

    // Add input field logic for inline editing of name
    const headerHtml = `
      <input type="text" id="ud-edit-name" value="${user.name}" style="font-size: 24px; font-weight: 600; color: var(--primary); border: 1px solid transparent; background: transparent; width: 100%; max-width: 300px; padding: 4px; border-radius: 4px;"
        onfocus="this.style.border='1px solid var(--border)'; this.style.background='white';"
        onblur="this.style.border='1px solid transparent'; this.style.background='transparent';">
    `;
    document.getElementById('ud-name').innerHTML = headerHtml;
    
    let convHtml = '';
    if (user.conversations && user.conversations.length > 0) {
      convHtml += '<div class="conversations-list" id="ud-conv-list">';
      user.conversations.forEach((conv, idx) => {
        let agentStr = conv.agent ? `<span class="conversation-agent">[${conv.agent}]</span>` : '';
        convHtml += `
          <div class="conversation-item">
            <div class="conversation-header">Conversation ${idx + 1} - ${conv.date} ${agentStr}</div>
            <div class="conversation-text">${conv.text}</div>
          </div>`;
      });
      convHtml += '</div>';
    } else {
      convHtml = `<div class="conversations-list" id="ud-conv-list"><p>No conversations yet.</p></div>`;
    }

    let histHtml = '';
    if (user.editHistory && user.editHistory.length > 0) {
      histHtml += '<div class="conversations-list" style="background: #fdfdfd; border: 1px dashed var(--border);">';
      user.editHistory.forEach((hist, idx) => {
        let agentStr = hist.agent ? `<span class="conversation-agent">[${hist.agent}]</span>` : '';
        histHtml += `
          <div class="conversation-item">
            <div class="conversation-header">Edit on ${hist.date} ${agentStr}</div>
            <div class="conversation-text" style="font-size: 13px; color: var(--text-light);">${hist.changes}</div>
          </div>`;
      });
      histHtml += '</div>';
    }

    const statusOptions = [
      'Pending', 'Confirmed', 'Not Interested', 'Follow Up',
      'Closed', 'Call Not Answered', 'General Inquiry', 'Call Dropped',
      'Patient Will Contact'
    ].map(opt =>
      `<option value="${opt}" ${user.status === opt ? 'selected' : ''}>${opt}</option>`
    ).join('');

    const branchOptions = ['', '100 Feet', 'Circular', 'Khalsa'].map(opt =>
      `<option value="${opt}" ${user.branch === opt ? 'selected' : ''}>${opt || 'Select Branch'}</option>`
    ).join('');

    const html = `
      <div class="ud-meta-grid">
        <div class="ud-row">
          <div class="ud-label">City:</div>
          <div class="ud-value" id="disp-city" data-original-city="${user.city}">
            <input type="text" id="ud-edit-city" value="${user.city}" style="font-size: 15px; color: var(--text-dark); border: 1px solid transparent; background: transparent; padding: 2px 4px; width: 100%; border-radius: 4px;"
            onfocus="this.style.border='1px solid var(--border)'; this.style.background='white';"
            onblur="this.style.border='1px solid transparent'; this.style.background='transparent';">
          </div>
        </div>
        <div class="ud-row"><div class="ud-label">Phone:</div><div class="ud-value" id="disp-phone"><a href="tel:${user.phone}" style="color: var(--primary); font-weight: 500; text-decoration: none; display: flex; align-items: center; gap: 5px;"><span class="material-icons" style="font-size: 16px;">call</span> ${user.phone}</a></div></div>
        <div class="ud-row"><div class="ud-label">Enquiry Date:</div><div class="ud-value" id="disp-enqDate">${user.enquiryDate}</div></div>
        <div class="ud-row"><div class="ud-label">Lead By:</div><div class="ud-value">${user.leadBy || 'N/A'}</div></div>
        <div class="ud-row"><div class="ud-label">Source:</div><div class="ud-value" id="disp-source">${user.source}</div></div>
        <div class="ud-row"><div class="ud-label">Status:</div><div class="ud-value" id="disp-status" data-original-status="${user.status || 'Pending'}">${user.status || 'Pending'}</div></div>
        <div class="ud-row"><div class="ud-label">Branch:</div><div class="ud-value" id="disp-branch">${user.branch || 'N/A'}</div></div>
        <div class="ud-row"><div class="ud-label">Contact Again Date:</div><div class="ud-value" id="disp-cad">${user.contactAgainDate || 'None'}</div></div>
        <div class="ud-row"><div class="ud-label">Registration ID:</div><div class="ud-value" id="disp-regid">${user.registrationId || 'None'}</div></div>
      </div>

      ${histHtml ? `<div class="ud-section-title">Edit History</div>${histHtml}` : ''}

      <div class="ud-section-title" style="display: flex; justify-content: space-between; align-items: center;">
        <span>Conversations</span>
        ${isCurrentUserAdmin ? `<button class="btn btn-outline" style="color: #e53935; border-color: #e53935; padding: 6px 12px; font-size: 12px;" onclick="handleDeleteLead(this)">Delete Lead</button>` : ''}
      </div>
      ${convHtml}

      <div class="update-box">
        <div class="update-box-title">Add Note & Update Status</div>
        <div class="update-grid">
          <div class="form-group">
            <label>Update Status</label>
            <select id="ud-update-status" onchange="toggleDetailRegId()">${statusOptions}</select>
          </div>
          <div class="form-group">
            <label>Update Branch</label>
            <select id="ud-update-branch">${branchOptions}</select>
          </div>
          <div class="form-group">
            <label>Contact Again Date</label>
            <input type="date" id="ud-update-cad" value="${user.contactAgainDate || ''}">
          </div>
          <div class="form-group" id="ud-regid-group" style="${user.status === 'Confirmed' ? '' : 'display: none;'}">
            <label>Registration ID</label>
            <input type="text" id="ud-update-regid" value="${user.registrationId || ''}" placeholder="Enter Registration ID">
          </div>
        </div>
        <div class="form-group">
          <textarea id="ud-new-conv" rows="2" placeholder="Add latest conversation notes (optional)..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveUserDetailConversation(this)">Update</button>
      </div>
    `;
    
    document.getElementById('ud-body').innerHTML = html;
  }

  function toggleDetailRegId() {
    const status = document.getElementById('ud-update-status').value;
    const regGroup = document.getElementById('ud-regid-group');
    if (status === 'Confirmed') {
      regGroup.style.display = 'block';
    } else {
      regGroup.style.display = 'none';
    }
  }

  function handleDeleteLead(btn) {
    if (!currentDetailRowIndex || !isCurrentUserAdmin) return;

    if (confirm('Are you sure you want to permanently delete this lead? This action cannot be undone.')) {
      btn.disabled = true;
      btn.textContent = 'Deleting...';

      google.script.run
        .withSuccessHandler(function(response) {
           closeUserDetail();
           // Lists automatically refresh when user detail closes, see closeUserDetail logic
           alert('Lead deleted successfully');
        })
        .withFailureHandler(function(error) {
           btn.disabled = false;
           btn.textContent = 'Delete Lead';
           alert('Error deleting lead: ' + error.message);
        })
        .deleteLead(currentDetailRowIndex, currentUsername);
    }
  }

  function saveUserDetailConversation(btn) {
    if (!currentDetailRowIndex) return;
    
    const textArea = document.getElementById('ud-new-conv');
    const text = textArea.value.trim();
    
    const status = document.getElementById('ud-update-status').value;
    const originalStatus = document.getElementById('disp-status').getAttribute('data-original-status');
    const branch = document.getElementById('ud-update-branch').value;
    const cad = document.getElementById('ud-update-cad').value;
    const regid = document.getElementById('ud-update-regid').value;

    // Name and City edits
    const nameInput = document.getElementById('ud-edit-name');
    const name = nameInput ? nameInput.value.trim() : null;
    const originalName = document.getElementById('ud-name').getAttribute('data-original-name');
    
    const cityInput = document.getElementById('ud-edit-city');
    const city = cityInput ? cityInput.value.trim() : null;
    const originalCity = document.getElementById('disp-city').getAttribute('data-original-city');

    btn.disabled = true;
    btn.textContent = 'Saving...';
    
    google.script.run
      .withSuccessHandler(function(response) {
        btn.disabled = false;
        btn.textContent = 'Update';
        textArea.value = '';
        
        // Update display text
        if(response.status) {
          document.getElementById('disp-status').textContent = response.status;
          document.getElementById('disp-status').setAttribute('data-original-status', response.status);
        }
        if(response.branch !== undefined) document.getElementById('disp-branch').textContent = response.branch || 'N/A';
        if(response.contactAgainDate !== undefined) document.getElementById('disp-cad').textContent = response.contactAgainDate || 'None';
        if(response.registrationId !== undefined) document.getElementById('disp-regid').textContent = response.registrationId || 'None';
        if(response.name) {
            document.getElementById('ud-name').setAttribute('data-original-name', response.name);
        }
        if(response.city) {
            document.getElementById('disp-city').setAttribute('data-original-city', response.city);
        }

        // Close and re-open to refresh the whole view (including edit history)
        // to keep it simple and ensure all DOM state (like input fields vs text) are accurately rebuilt.
        openUserDetail(currentDetailRowIndex);
      })
      .withFailureHandler(function(error) {
        btn.disabled = false;
        btn.textContent = 'Update';
        alert('Error saving: ' + error.message);
      })
      .addConversation(currentDetailRowIndex, text, currentUser, status, branch, cad, regid, originalStatus, name, city, originalName, originalCity);
  }

  // --- Add Data Form ---
  function handleFormSubmit(event) {
    event.preventDefault();
    const btn = document.getElementById('submit-btn');
    const msgDiv = document.getElementById('add-message');
    
    btn.disabled = true;
    btn.textContent = 'Saving...';
    msgDiv.className = 'message';
    msgDiv.textContent = '';

    const form = document.getElementById('add-data-form');
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    google.script.run
      .withSuccessHandler(function(response) {
        msgDiv.className = 'message success';
        msgDiv.textContent = response.message;
        form.reset();
        btn.disabled = false;
        btn.textContent = 'Save Customer';
        setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
      })
      .withFailureHandler(function(error) {
        msgDiv.className = 'message error';
        msgDiv.textContent = 'Error: ' + error.message;
        btn.disabled = false;
        btn.textContent = 'Save Customer';
      })
      .addCustomer(data);
  }
</script>
