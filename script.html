<script>
  let currentUser = null;
  let dashboardChartInstance = null;
  let currentDetailRowIndex = null;

  // Mobile Sidebar Toggle
  function toggleSidebar(isOpen) {
    const sidebar = document.getElementById('app-sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');
    
    if (isOpen === undefined) {
      sidebar.classList.toggle('open');
      backdrop.classList.toggle('active');
    } else if (isOpen) {
      sidebar.classList.add('open');
      backdrop.classList.add('active');
    } else {
      sidebar.classList.remove('open');
      backdrop.classList.remove('active');
    }
  }

  // Mobile Filters Accordion Toggle
  function toggleFilters(inputsId, headerEl) {
    const inputs = document.getElementById(inputsId);
    const bar = headerEl.closest('.filter-bar');
    if (inputs.classList.contains('collapsed')) {
      inputs.classList.remove('collapsed');
      bar.classList.add('expanded');
    } else {
      inputs.classList.add('collapsed');
      bar.classList.remove('expanded');
    }
  }

  // Handle User Login
  function handleLogin(event) {
    event.preventDefault();
    const btn = document.getElementById('login-btn');
    const msgDiv = document.getElementById('login-message');
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Logging in...';
    msgDiv.style.display = 'none';

    google.script.run
      .withSuccessHandler(function(response) {
        if (response.success) {
          currentUser = response.name;
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('app-container').style.display = 'flex';
          document.getElementById('logged-in-user').textContent = 'Logged in as: ' + currentUser;
          
          // Defaults for dashboard
          const today = new Date();
          const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
          document.getElementById('dash-end-date').valueAsDate = today;
          document.getElementById('dash-start-date').valueAsDate = firstDay;
          
          fetchDashboardStats();
        } else {
          msgDiv.style.display = 'block';
          msgDiv.textContent = response.message;
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      })
      .withFailureHandler(function(error) {
        msgDiv.style.display = 'block';
        msgDiv.textContent = 'Error: ' + error.message;
        btn.disabled = false;
        btn.textContent = 'Login';
      })
      .login(user, pass);
  }

  function logout() {
    currentUser = null;
    document.getElementById('login-form').reset();
    document.getElementById('app-container').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function showSection(sectionId, element) {
    document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
    
    if (element) {
      document.querySelectorAll('.nav-links li').forEach(li => li.classList.remove('active'));
      element.classList.add('active');
    }
    closeUserDetail();
    toggleSidebar(false); // Close mobile drawer when user switches section
  }

  // --- Dashboard ---
  function fetchDashboardStats() {
    const start = document.getElementById('dash-start-date').value;
    const end = document.getElementById('dash-end-date').value;
    
    google.script.run
      .withSuccessHandler(function(stats) {
        document.getElementById('stat-total').textContent = stats.total;
        document.getElementById('stat-confirmed').textContent = stats.confirmed;
        renderChart(stats.timeline);
      })
      .getDashboardStats(start, end);
  }

  function renderChart(timeline) {
    const ctx = document.getElementById('dashboardChart').getContext('2d');
    const labels = Object.keys(timeline);
    const totalData = labels.map(l => timeline[l].total);
    const confirmedData = labels.map(l => timeline[l].confirmed);

    if (dashboardChartInstance) dashboardChartInstance.destroy();

    dashboardChartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          { label: 'Total Enquiries', data: totalData, backgroundColor: '#1a73e8', borderRadius: 4 },
          { label: 'Confirmed', data: confirmedData, backgroundColor: '#137333', borderRadius: 4 }
        ]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false, 
        plugins: {
          legend: {
            labels: {
              font: {
                family: "'Plus Jakarta Sans', sans-serif",
                size: 12
              }
            }
          }
        },
        scales: { 
          x: {
            grid: { display: false },
            ticks: {
              font: { family: "'Plus Jakarta Sans', sans-serif" }
            }
          },
          y: { 
            beginAtZero: true, 
            ticks: { 
              stepSize: 1,
              font: { family: "'Plus Jakarta Sans', sans-serif" }
            } 
          } 
        } 
      }
    });
  }

  // --- All Leads ---
  function clearAllLeadsFilters() {
    document.getElementById('al-filter-name').value = '';
    document.getElementById('al-filter-phone').value = '';
    document.getElementById('al-filter-city').value = '';
    document.getElementById('al-filter-start').value = '';
    document.getElementById('al-filter-end').value = '';
    document.getElementById('al-filter-sort').value = 'fresh';
    fetchAllLeads(1);
  }

  function fetchAllLeads(page) {
    const params = {
      name: document.getElementById('al-filter-name').value,
      phone: document.getElementById('al-filter-phone').value,
      city: document.getElementById('al-filter-city').value,
      startDate: document.getElementById('al-filter-start').value,
      endDate: document.getElementById('al-filter-end').value,
      sortOrder: document.getElementById('al-filter-sort').value,
      page: page
    };
    
    document.getElementById('al-loading').style.display = 'flex';
    document.getElementById('al-list').innerHTML = '';
    document.getElementById('al-pagination').innerHTML = '';

    google.script.run
      .withSuccessHandler(function(response) {
        document.getElementById('al-loading').style.display = 'none';
        renderLeadsList('al-list', response.leads);
        renderPagination('al-pagination', response.currentPage, response.totalPages, 'fetchAllLeads');
      })
      .getFilteredLeads(params);
  }

  // --- Today Calls ---
  function clearTodayCallsFilters() {
    document.getElementById('tc-filter-name').value = '';
    document.getElementById('tc-filter-phone').value = '';
    document.getElementById('tc-filter-city').value = '';
    document.getElementById('tc-filter-sort').value = 'fresh';
    fetchTodayCalls(1);
  }

  function fetchTodayCalls(page) {
    const params = {
      name: document.getElementById('tc-filter-name').value,
      phone: document.getElementById('tc-filter-phone').value,
      city: document.getElementById('tc-filter-city').value,
      sortOrder: document.getElementById('tc-filter-sort').value,
      isTodayOnly: true,
      page: page
    };
    
    document.getElementById('tc-loading').style.display = 'flex';
    document.getElementById('tc-list').innerHTML = '';
    document.getElementById('tc-pagination').innerHTML = '';

    google.script.run
      .withSuccessHandler(function(response) {
        document.getElementById('tc-loading').style.display = 'none';
        renderLeadsList('tc-list', response.leads);
        renderPagination('tc-pagination', response.currentPage, response.totalPages, 'fetchTodayCalls');
      })
      .getFilteredLeads(params);
  }

  // --- Shared List Render ---
  function renderLeadsList(containerId, leads) {
    const container = document.getElementById(containerId);
    if (leads.length === 0) {
      container.innerHTML = '<p style="color:var(--text-light); text-align: center; padding: 24px;">No records found matching criteria.</p>';
      return;
    }

    let html = '';
    leads.forEach(lead => {
      const statusClass = (lead.status || 'Pending').toLowerCase().replace(/\s+/g, '-');
      html += `
        <div class="lead-item">
          <div class="lead-info">
            <span class="lead-name" onclick="openUserDetail(${lead.rowIndex})">${lead.name}</span>
            <div class="lead-meta">
              <span><span class="material-icons">phone</span> ${lead.phone}</span>
              <span><span class="material-icons">location_on</span> ${lead.city}</span>
              <span><span class="material-icons">calendar_today</span> ${lead.enquiryDate}</span>
              <span class="status-badge badge-${statusClass}">${lead.status || 'Pending'}</span>
            </div>
            <div class="latest-note-box">
              <strong>Latest Note:</strong> ${lead.latestConversation}
            </div>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  function renderPagination(containerId, currentPage, totalPages, fetchFuncStr) {
    if (totalPages <= 1) return;
    const container = document.getElementById(containerId);
    let html = '';
    
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="${fetchFuncStr}(${currentPage - 1})">Prev</button>`;
    
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="${fetchFuncStr}(${i})">${i}</button>`;
      } else if (i === currentPage - 3 || i === currentPage + 3) {
        html += `<span style="padding: 6px;">...</span>`;
      }
    }
    
    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="${fetchFuncStr}(${currentPage + 1})">Next</button>`;
    
    container.innerHTML = html;
  }

  // --- User Detail View (Overlay) ---
  function openUserDetail(rowIndex) {
    currentDetailRowIndex = rowIndex;
    document.getElementById('user-detail-overlay').style.display = 'flex';
    document.getElementById('ud-body').innerHTML = '<div class="loading">Loading details...</div>';
    document.getElementById('ud-name').textContent = 'Loading...';

    google.script.run
      .withSuccessHandler(renderUserDetail)
      .getUserDetails(rowIndex);
  }

  function closeUserDetail() {
    document.getElementById('user-detail-overlay').style.display = 'none';
    currentDetailRowIndex = null;
    // Refresh current visible list to reflect any changes
    if (document.getElementById('all-leads-section').classList.contains('active')) {
      fetchAllLeads(document.querySelector('#al-pagination .active') ? parseInt(document.querySelector('#al-pagination .active').textContent) : 1);
    } else if (document.getElementById('today-calls-section').classList.contains('active')) {
      fetchTodayCalls(document.querySelector('#tc-pagination .active') ? parseInt(document.querySelector('#tc-pagination .active').textContent) : 1);
    }
  }

  // Handle registration ID showing dynamically in detail panel
  function handleStatusChange(status, currentRegId) {
    const regContainer = document.getElementById('ud-reg-id-container');
    const regInput = document.getElementById('ud-update-reg-id');
    
    if (status === 'Confirmed') {
      regContainer.style.display = 'block';
      if (regInput) {
        regInput.required = true;
        if (!regInput.value && currentRegId) {
          regInput.value = currentRegId;
        }
      }
    } else {
      regContainer.style.display = 'none';
      if (regInput) {
        regInput.required = false;
      }
    }
  }

  function renderUserDetail(user) {
    document.getElementById('ud-name').textContent = user.name;
    
    let convHtml = '';
    if (user.conversations && user.conversations.length > 0) {
      convHtml += '<div class="conversations-list" id="ud-conv-list">';
      user.conversations.forEach((conv, idx) => {
        let agentStr = conv.agent ? `<span class="conversation-agent">[${conv.agent}]</span>` : '';
        convHtml += `
          <div class="conversation-item">
            <div class="conversation-header">Conversation ${idx + 1} - ${conv.date} ${agentStr}</div>
            <div class="conversation-text">${conv.text}</div>
          </div>`;
      });
      convHtml += '</div>';
    } else {
      convHtml = `<div class="conversations-list" id="ud-conv-list"><p style="color: var(--text-light); text-align: center;">No conversations yet.</p></div>`;
    }

    const statusOptions = ['Pending', 'Confirmed', 'Not Interested', 'Follow Up'].map(opt => 
      `<option value="${opt}" ${user.status === opt ? 'selected' : ''}>${opt}</option>`
    ).join('');

    const html = `
      <div class="ud-meta-grid">
        <div class="ud-row"><div class="ud-label">City</div><div class="ud-value" id="disp-city">${user.city || 'N/A'}</div></div>
        <div class="ud-row"><div class="ud-label">Phone</div><div class="ud-value" id="disp-phone">${user.phone || 'N/A'}</div></div>
        <div class="ud-row"><div class="ud-label">Enquiry Date</div><div class="ud-value" id="disp-enqDate">${user.enquiryDate || 'N/A'}</div></div>
        <div class="ud-row"><div class="ud-label">Source</div><div class="ud-value" id="disp-source">${user.source || 'N/A'}</div></div>
        <div class="ud-row"><div class="ud-label">Status</div><div class="ud-value" id="disp-status">${user.status || 'Pending'}</div></div>
        <div class="ud-row"><div class="ud-label">Branch</div><div class="ud-value" id="disp-branch">${user.branch || 'N/A'}</div></div>
        <div class="ud-row"><div class="ud-label">Contact Again Date</div><div class="ud-value" id="disp-cad">${user.contactAgainDate || 'None'}</div></div>
        <div class="ud-row"><div class="ud-label">Registration ID</div><div class="ud-value" id="disp-regId">${user.registrationId || 'None'}</div></div>
      </div>

      <div class="ud-section-title">Conversations</div>
      ${convHtml}

      <div class="update-box">
        <div class="update-box-title">Add Note & Update Status</div>
        <div class="update-grid">
          <div class="form-group">
            <label for="ud-update-status">Update Status</label>
            <select id="ud-update-status" onchange="handleStatusChange(this.value, '${user.registrationId || ''}')">${statusOptions}</select>
          </div>
          <div class="form-group">
            <label for="ud-update-branch">Update Branch</label>
            <input type="text" id="ud-update-branch" value="${user.branch || ''}" placeholder="e.g. Downtown">
          </div>
          <div class="form-group">
            <label for="ud-update-cad">Contact Again Date</label>
            <input type="date" id="ud-update-cad" value="${user.contactAgainDate || ''}">
          </div>
          <div class="form-group reg-id-group" id="ud-reg-id-container" style="display: none;">
            <label for="ud-update-reg-id">Registration ID <span style="color:var(--danger)">*</span></label>
            <input type="text" id="ud-update-reg-id" value="${user.registrationId || ''}" placeholder="Enter Registration ID">
          </div>
        </div>
        <div class="form-group">
          <label for="ud-new-conv">Conversation Notes</label>
          <textarea id="ud-new-conv" rows="2" placeholder="Add latest conversation notes..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveUserDetailConversation(this)">Add Note & Update</button>
      </div>
    `;
    
    document.getElementById('ud-body').innerHTML = html;
    
    // Check status immediately to show Registration ID if status is Confirmed
    handleStatusChange(user.status, user.registrationId);
  }

  function saveUserDetailConversation(btn) {
    if (!currentDetailRowIndex) return;
    
    const textArea = document.getElementById('ud-new-conv');
    const text = textArea.value.trim();
    if (!text) return alert('Please enter conversation notes');
    
    const status = document.getElementById('ud-update-status').value;
    const branch = document.getElementById('ud-update-branch').value;
    const cad = document.getElementById('ud-update-cad').value;
    
    // Retrieve Registration ID
    const regIdInput = document.getElementById('ud-update-reg-id');
    const regId = regIdInput ? regIdInput.value.trim() : '';
    
    if (status === 'Confirmed' && !regId) {
      return alert('Registration ID is required when status is Confirmed.');
    }
    
    btn.disabled = true;
    btn.textContent = 'Saving...';
    
    google.script.run
      .withSuccessHandler(function(response) {
        btn.disabled = false;
        btn.textContent = 'Add Note & Update';
        textArea.value = '';
        
        // Update display text
        if(response.status) document.getElementById('disp-status').textContent = response.status;
        if(response.branch) document.getElementById('disp-branch').textContent = response.branch;
        if(response.contactAgainDate) document.getElementById('disp-cad').textContent = response.contactAgainDate;
        if(response.registrationId) {
          document.getElementById('disp-regId').textContent = response.registrationId;
        } else {
          document.getElementById('disp-regId').textContent = 'None';
        }

        // Re-render conversation list inline
        const convListDiv = document.getElementById('ud-conv-list');
        let newHtml = '';
        response.conversations.forEach((conv, idx) => {
          let agentStr = conv.agent ? `<span class="conversation-agent">[${conv.agent}]</span>` : '';
          newHtml += `
            <div class="conversation-item">
              <div class="conversation-header">Conversation ${idx + 1} - ${conv.date} ${agentStr}</div>
              <div class="conversation-text">${conv.text}</div>
            </div>`;
        });
        convListDiv.innerHTML = newHtml;
        
        // Update handling status changes again
        handleStatusChange(response.status, response.registrationId);
      })
      .withFailureHandler(function(error) {
        btn.disabled = false;
        btn.textContent = 'Add Note & Update';
        alert('Error saving note: ' + error.message);
      })
      .addConversation(currentDetailRowIndex, text, currentUser, status, branch, cad, regId);
  }

  // --- Add Data Form ---
  function handleFormSubmit(event) {
    event.preventDefault();
    const btn = document.getElementById('submit-btn');
    const msgDiv = document.getElementById('add-message');
    
    btn.disabled = true;
    btn.textContent = 'Saving...';
    msgDiv.className = 'message';
    msgDiv.textContent = '';

    const form = document.getElementById('add-data-form');
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    google.script.run
      .withSuccessHandler(function(response) {
        msgDiv.className = 'message success';
        msgDiv.textContent = response.message;
        form.reset();
        btn.disabled = false;
        btn.textContent = 'Save Customer';
        setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
      })
      .withFailureHandler(function(error) {
        msgDiv.className = 'message error';
        msgDiv.textContent = 'Error: ' + error.message;
        btn.disabled = false;
        btn.textContent = 'Save Customer';
      })
      .addCustomer(data);
  }
</script>
