<script>
  let currentUser = null;
  let currentUsername = null;
  let isCurrentUserAdmin = false;
  let dashboardChartInstance = null;
  let trendChartInstance = null;
  let sourceChartInstance = null;
  let leadByChartInstance = null;
  let currentDetailRowIndex = null;
  let currentClientDetailId = null;
  let appHistoryReady = false;
  let previousSectionId = 'dashboard-section'; // track where we came from before lead detail

  // --- Inactivity / Session Keep-Alive ---
  const INACTIVITY_WARNING_MS = 25 * 60 * 1000; // warn at 25 min
  const INACTIVITY_LOGOUT_MS  = 30 * 60 * 1000; // logout at 30 min
  let inactivityWarningTimer = null;
  let inactivityLogoutTimer  = null;

  function normalizeInput(value) {
    return String(value || '').trim();
  }

  function setLoginMessage(message) {
    const msgDiv = document.getElementById('login-message');
    msgDiv.textContent = message || '';
    msgDiv.style.display = message ? 'block' : 'none';
    document.getElementById('username').toggleAttribute('aria-invalid', Boolean(message));
    document.getElementById('password').toggleAttribute('aria-invalid', Boolean(message));
  }

  function getActiveSectionId() {
    const active = document.querySelector('.content-section.active');
    return active ? active.id : 'dashboard-section';
  }

  function getCurrentAppState() {
    const section = getActiveSectionId();
    if (section === 'lead-detail-section' && currentDetailRowIndex) {
      return { view: 'app', section: section, rowIndex: currentDetailRowIndex };
    }
    if (section === 'client-detail-section' && currentClientDetailId) {
      return { view: 'app', section: section, clientId: currentClientDetailId };
    }
    return { view: 'app', section: section };
  }

  function initAppHistory() {
    history.replaceState({ view: 'app', section: getActiveSectionId() }, '', location.href);
    if (!appHistoryReady) {
      appHistoryReady = true;
      window.addEventListener('popstate', handleAppPopState);
    }
  }

  function pushAppState(state) {
    if (!currentUser || !appHistoryReady) return;
    history.pushState(Object.assign({ view: 'app', section: getActiveSectionId() }, state), '', location.href);
  }

  function loadSectionData(sectionId) {
    if (sectionId === 'dashboard-section') fetchDashboardStats();
    if (sectionId === 'all-leads-section') fetchAllLeads(1);
    if (sectionId === 'clients-section') fetchAllClients(1);
    if (sectionId === 'today-calls-section') fetchTodayCalls(1);
  }

  function handleAppPopState(event) {
    if (!currentUser) return;
    const state = event.state;
    if (!state || state.view !== 'app') {
      history.pushState(getCurrentAppState(), '', location.href);
      return;
    }

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';

    if (state.section === 'lead-detail-section' && state.rowIndex) {
      openLeadDetailPage(state.rowIndex, false);
    } else if (state.section === 'client-detail-section' && state.clientId) {
      openClientDetail(state.clientId, false);
    } else {
      showSection(state.section || 'dashboard-section', null, false);
      loadSectionData(state.section || 'dashboard-section');
    }
  }

  function statusClass(status) {
    const key = normalizeInput(status || 'Pending').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    return 'status-' + (key || 'pending');
  }

  function statusBadge(status) {
    const label = normalizeInput(status || 'Pending') || 'Pending';
    return `<span class="status-badge ${statusClass(label)}"><span class="material-icons">flag</span>${label}</span>`;
  }

  function leadDateHtml(lead) {
    if (lead.contactAgainDate) {
      return `<span class="lead-date cad-date"><span class="material-icons">event_repeat</span> CAD: ${lead.contactAgainDate}</span>`;
    }
    return `<span class="lead-date"><span class="material-icons">calendar_today</span> ${lead.enquiryDate}</span>`;
  }

  // Login
  function handleLogin(event) {
    event.preventDefault();
    const btn = document.getElementById('login-btn');
    const user = normalizeInput(document.getElementById('username').value);
    const pass = normalizeInput(document.getElementById('password').value);

    btn.disabled = true;
    btn.textContent = 'Logging in...';
    setLoginMessage('');

    google.script.run
      .withSuccessHandler(function(response) {
        if (response.success) {
          currentUser = response.name;
          currentUsername = user;
          isCurrentUserAdmin = response.isAdmin;
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('app-container').style.display = 'flex';
          document.getElementById('logged-in-user').textContent = 'Logged in as: ' + currentUser + (isCurrentUserAdmin ? ' (Admin)' : '');
          initAppHistory();
          startInactivityTimer(); // begin inactivity countdown
          
          // Show/hide dashboard nav item based on admin status
          const dashNav = document.querySelector('.nav-links li[data-section="dashboard-section"]');
          if (dashNav) dashNav.style.display = response.isAdmin ? '' : 'none';

          if (response.isAdmin) {
            // Defaults for dashboard
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            document.getElementById('dash-end-date').valueAsDate = today;
            document.getElementById('dash-start-date').valueAsDate = firstDay;
            fetchDashboardStats();
          } else {
            // Callers land on All Leads instead
            showSection('all-leads-section', document.querySelector('.nav-links li[data-section="all-leads-section"]'), false);
            fetchAllLeads(1);
          }
        } else {
          setLoginMessage(response.message || 'Invalid credentials');
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      })
      .withFailureHandler(function(error) {
        setLoginMessage('Error: ' + error.message);
        btn.disabled = false;
        btn.textContent = 'Login';
      })
      .login(user, pass);
  }

  function logout() {
    currentUser = null;
    currentUsername = null;
    isCurrentUserAdmin = false;
    clearInactivityTimers();
    document.getElementById('login-form').reset();
    setLoginMessage('');
    document.getElementById('app-container').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    history.replaceState({ view: 'login' }, '', location.href);
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');
    if (window.innerWidth <= 768) {
      // Mobile: slide in/out with backdrop
      const isOpen = sidebar.classList.toggle('open');
      if (backdrop) backdrop.classList.toggle('active', isOpen);
    } else {
      // Desktop: collapse/expand width
      sidebar.classList.toggle('collapsed');
    }
  }

  function closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');
    sidebar.classList.remove('open');
    if (backdrop) backdrop.classList.remove('active');
  }

  function showSection(sectionId, element, shouldPushState = true) {
    // Guard: only admin can see the dashboard
    if (sectionId === 'dashboard-section' && !isCurrentUserAdmin) {
      sectionId = 'all-leads-section';
      element = document.querySelector('.nav-links li[data-section="all-leads-section"]');
    }
    document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
    
    if (element) {
      document.querySelectorAll('.nav-links li').forEach(li => li.classList.remove('active'));
      element.classList.add('active');
    } else {
      document.querySelectorAll('.nav-links li').forEach(li => {
        const onclick = li.getAttribute('onclick') || '';
        li.classList.toggle('active', onclick.indexOf(sectionId) !== -1);
      });
    }
    
    // Clean up IDs when navigating away to other main sections
    if (sectionId !== 'client-detail-section' && sectionId !== 'lead-detail-section') {
      currentClientDetailId = null;
    }
    if (sectionId !== 'lead-detail-section') {
      currentDetailRowIndex = null;
    }

    if (shouldPushState) pushAppState({ section: sectionId });
    
    // Auto-close sidebar + backdrop on mobile after clicking a link
    if (window.innerWidth <= 768) {
      closeSidebar();
    }
  }

  // --- Dashboard ---
  function fetchDashboardStats() {
    const start = document.getElementById('dash-start-date').value;
    const end = document.getElementById('dash-end-date').value;
    
    google.script.run
      .withSuccessHandler(function(stats) {
        document.getElementById('stat-conv-overall').textContent = stats.overallConversionRate + '%';
        
        const cityListEl = document.getElementById('stat-city-lead-list');
        if (stats.topLeadCities && stats.topLeadCities.length > 0) {
          cityListEl.innerHTML = stats.topLeadCities.map((city, idx) => `
            <li style="display: flex; justify-content: space-between; padding: 10px; background: var(--bg-light); border-radius: 8px;">
              <span style="font-weight: 500; text-transform: capitalize;">${idx + 1}. ${city.name}</span>
              <span style="color: var(--primary); font-weight: bold;">${city.count} leads</span>
            </li>
          `).join('');
        } else {
          cityListEl.innerHTML = '<li style="color: var(--text-light); text-align: center;">None</li>';
        }
        
        renderChart(stats);
        renderTrendChart(stats.timeline);
        renderSourceChart(stats.sources);
        renderLeadByChart(stats.leadBy);
        renderBranchChart(stats.branchStats);
      })
      .getDashboardStats(start, end);
  }

  function renderChart(stats) {
    const ctx = document.getElementById('dashboardChart').getContext('2d');
    
    // "Other" bar = Pending + Follow Up + Not Interested + No Answer + (historical Call Dropped)
    const otherCount = stats.otherGroup ||
      (stats.pending + stats.followUp + stats.notInterested + stats.callNotAnswered + (stats.callDropped || 0));

    // Total confirmed across all arrival statuses
    const confirmedTotal = stats.confirmed ||
      (stats.confirmedReached + (stats.confirmedNotReached || 0) + stats.confirmedClosed + (stats.confirmedWithoutReg || 0));

    const labels = [
      'Total Enquiries',
      'Other\n(Pend+FU+NI+NA)',
      'Gen Inquiry',
      'Pat Will Contact',
      'Confirmed',
      'Conf – Closed',
      'Closed'
    ];
    const data = [
      stats.total,
      otherCount,
      stats.generalInquiry,
      stats.patientWillContact,
      confirmedTotal,
      stats.confirmedClosed,
      stats.closed
    ];
    const bgColors = [
      '#006A7F',  // Total – teal
      '#78909c',  // Other – blue-grey
      '#00bcd4',  // Gen Inquiry – cyan
      '#8e24aa',  // Pat Will Contact – purple
      '#1565c0',  // Confirmed total – dark blue
      '#e53935',  // Conf Closed – red
      '#9e9e9e'   // Closed – grey
    ];

    if (dashboardChartInstance) dashboardChartInstance.destroy();

    dashboardChartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Leads',
          data: data,
          backgroundColor: bgColors,
          borderRadius: 5
        }]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false, 
        plugins: {
          legend: { display: false },
          title: { display: true, text: 'Lead Status Overview' },
          tooltip: {
            callbacks: {
              afterLabel: function(ctx) {
                // Hover "Other" bar — show breakdown
                if (ctx.dataIndex === 1) {
                  return [
                    '  Pending: ' + stats.pending,
                    '  Follow Up: ' + stats.followUp,
                    '  Not Interested: ' + stats.notInterested,
                    '  No Answer: ' + stats.callNotAnswered
                  ];
                }
                // Hover "Confirmed" bar — show sub-breakdown
                if (ctx.dataIndex === 4) {
                  return [
                    '  Reached: ' + stats.confirmedReached,
                    '  Closed: ' + stats.confirmedClosed,
                    '  Pending Arrival: ' + ((stats.confirmedWithoutReg || 0) + (stats.confirmedNotReached || 0))
                  ];
                }
                return [];
              }
            }
          }
        },
        scales: { 
          y: { beginAtZero: true, ticks: { stepSize: 1 } } 
        } 
      }
    });
  }

  function renderTrendChart(timeline) {
    const ctx = document.getElementById('trendChart').getContext('2d');
    // Sort dates ascending (oldest → newest) for correct left-to-right trend
    const labels = Object.keys(timeline).sort();
    const totalData   = labels.map(l => timeline[l].total);
    const reachedData = labels.map(l => timeline[l].reached || 0);

    if (trendChartInstance) trendChartInstance.destroy();

    trendChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: 'Total Enquiries', data: totalData,   borderColor: '#006A7F', backgroundColor: 'rgba(0,106,127,0.1)', fill: true, tension: 0.3 },
          { label: 'Confirmed – Reached', data: reachedData, borderColor: '#2e7d32', backgroundColor: 'rgba(46,125,50,0.1)', fill: true, tension: 0.3 }
        ]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false, 
        plugins: {
          title: { display: true, text: 'Enquiries vs Reached' }
        },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } 
      }
    });
  }

  function renderSourceChart(sources) {
    const ctx = document.getElementById('sourceChart').getContext('2d');
    const labels = Object.keys(sources);
    const data = labels.map(l => sources[l]);
    
    const bgColors = [
      '#006A7F', '#34c759', '#fbbc04', '#ea4335', '#4285f4', 
      '#8e24aa', '#f06292', '#4dd0e1', '#4db6ac', '#aed581',
      '#ffb74d', '#ba68c8', '#4dd0e1', '#dce775', '#a1887f'
    ];

    if (sourceChartInstance) sourceChartInstance.destroy();

    sourceChartInstance = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: bgColors.slice(0, labels.length)
        }]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom' },
          title: { display: true, text: 'Lead Sources' }
        }
      }
    });
  }

  function renderLeadByChart(leadByData) {
    const ctx = document.getElementById('leadByChart').getContext('2d');
    const labels = Object.keys(leadByData);
    const data = labels.map(l => leadByData[l]);

    const bgColors = ['#4285f4', '#34a853', '#fbbc04', '#ea4335', '#8e24aa'];

    if (leadByChartInstance) leadByChartInstance.destroy();

    leadByChartInstance = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: bgColors.slice(0, labels.length)
        }]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom' },
          title: { display: true, text: 'Leads by Medium' }
        }
      }
    });
  }

  function renderBranchChart(branchData) {
    const ctx = document.getElementById('branchChart').getContext('2d');
    const labels = Object.keys(branchData || {});
    const data = labels.map(l => branchData[l]);
    const total = data.reduce((s, v) => s + v, 0);

    const bgColors = [
      '#006A7F', '#34c759', '#fbbc04', '#e53935', '#8e24aa',
      '#4285f4', '#ff7043', '#26c6da', '#ab47bc', '#66bb6a'
    ];

    if (window.branchChartInstance) window.branchChartInstance.destroy();

    if (labels.length === 0) {
      ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
      ctx.font = '14px Roboto';
      ctx.fillStyle = '#aaa';
      ctx.textAlign = 'center';
      ctx.fillText('No branch data in this date range', ctx.canvas.width / 2, ctx.canvas.height / 2);
      return;
    }

    window.branchChartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Leads Transferred',
          data: data,
          backgroundColor: bgColors.slice(0, labels.length),
          borderRadius: 5
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          title: { display: true, text: 'Branch-wise Lead Transfers  (Total assigned: ' + total + ')' },
          tooltip: {
            callbacks: {
              label: function(ctx) {
                const pct = total > 0 ? ((ctx.parsed.x / total) * 100).toFixed(1) : 0;
                return ' ' + ctx.parsed.x + ' leads (' + pct + '%)';
              }
            }
          }
        },
        scales: {
          x: { beginAtZero: true, ticks: { stepSize: 1 } }
        }
      }
    });
  }

  // --- Clients Database ---
  function clearClientsFilters() {
    document.getElementById('cd-filter-name').value = '';
    document.getElementById('cd-filter-phone').value = '';
    fetchAllClients();
  }

  function fetchAllClients() {
    const params = {
      name: document.getElementById('cd-filter-name').value,
      phone: document.getElementById('cd-filter-phone').value
    };
    
    document.getElementById('cd-loading').style.display = 'block';
    document.getElementById('cd-list').innerHTML = '';

    google.script.run
      .withSuccessHandler(function(response) {
        document.getElementById('cd-loading').style.display = 'none';
        renderClientsList('cd-list', response.clients);
      })
      .getFilteredClients(params);
  }

  function renderClientsList(containerId, clients) {
    const container = document.getElementById(containerId);
    if (clients.length === 0) {
      container.innerHTML = '<p style="color:var(--text-light)">No clients found.</p>';
      return;
    }

    let html = '';
    clients.forEach(client => {
      let regIdHtml = client.regId ? `<span><span class="material-icons">badge</span> ${client.regId}</span>` : '';
      html += `
        <div class="lead-item" style="cursor: pointer;" onclick="openClientDetail('${client.clientId}')">
          <div class="lead-info">
            <span class="lead-name">${client.name}</span>
            <div class="lead-meta">
              <span><span class="material-icons">phone</span> <a href="tel:${client.phone}" style="color: inherit; text-decoration: none;" onclick="event.stopPropagation()">${client.phone}</a></span>
              <span><span class="material-icons">location_on</span> ${client.city}</span>
              ${regIdHtml}
            </div>
            <div class="lead-count"><strong>Total Leads:</strong> ${client.leadCount}</div>
          </div>
          <div class="lead-actions" style="margin-left: 15px; display: flex; align-items: center; gap: 10px;">
            <a href="tel:${client.phone}" class="btn btn-primary" style="display: inline-flex; align-items: center; justify-content: center; padding: 10px; border-radius: 50%;" onclick="event.stopPropagation()">
              <span class="material-icons" style="font-size: 20px; margin: 0;">call</span>
            </a>
            <span class="material-icons" style="color: var(--text-light); font-size: 20px;">chevron_right</span>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  // --- Client Detail Page (Full Page, no overlay) ---
  let previousClientSectionId = 'clients-section';

  function openClientDetail(clientId, shouldPushState = true) {
    currentClientDetailId = clientId;
    const fromSection = getActiveSectionId();
    if (fromSection !== 'client-detail-section' && fromSection !== 'lead-detail-section') {
      previousClientSectionId = fromSection;
    }
    showSection('client-detail-section', null, false);
    const mainContent = document.getElementById('main-content-area');
    if (mainContent) mainContent.scrollTop = 0;
    window.scrollTo(0, 0);
    document.getElementById('cd-page-body').innerHTML = '<div class="loading">Loading client details...</div>';
    if (shouldPushState) pushAppState({ section: 'client-detail-section', clientId: clientId });

    google.script.run
      .withSuccessHandler(renderClientDetail)
      .withFailureHandler(function(error) {
        document.getElementById('cd-page-body').innerHTML = `<div class="message error" style="display:block;">Error loading client: ${error.message}</div>`;
      })
      .getClientDetailsWithLeads(clientId);
  }

  function closeClientDetailPage(syncHistory = true) {
    currentClientDetailId = null;
    showSection(previousClientSectionId || 'clients-section', null, false);
    if (syncHistory && history.state && history.state.section === 'client-detail-section') {
      history.back();
    }
  }

  // Backward-compat alias
  function closeClientDetail(syncHistory = true) {
    if (getActiveSectionId() === 'client-detail-section') {
      closeClientDetailPage(syncHistory);
    }
  }

  function renderClientDetail(data) {
    const body = document.getElementById('cd-page-body');
    body.setAttribute('data-client-id', data.clientId || '');

    let histHtml = '';
    if (data.editHistory && data.editHistory.length > 0) {
      histHtml += '<div class="conversations-list" style="background: #fdfdfd; border: 1px dashed var(--border);">';
      data.editHistory.forEach((hist) => {
        let agentStr = hist.agent ? `<span class="conversation-agent">[${hist.agent}]</span>` : '';
        histHtml += `
          <div class="conversation-item">
            <div class="conversation-header">Edit on ${hist.date} ${agentStr}</div>
            <div class="conversation-text" style="font-size: 13px; color: var(--text-light);">${hist.changes}</div>
          </div>`;
      });
      histHtml += '</div>';
    }

    let leadsHtml = '';
    if (data.leads && data.leads.length > 0) {
      data.leads.forEach((lead, idx) => {
        let arrivalHtml = (lead.clientType === 'Returning' && lead.arrivalStatus)
          ? `<span><span class="material-icons">directions_walk</span> ${lead.arrivalStatus}</span>` : '';
        const dateHtml = leadDateHtml(lead);
        leadsHtml += `
          <div class="lead-item" style="cursor: pointer;" onclick="openUserDetail(${lead.rowIndex})">
            <div class="lead-info">
              <span class="lead-name" style="font-size: 16px;">Lead ${data.leads.length - idx}
                <span style="font-size: 12px; color: var(--text-light); font-weight: normal;">(${lead.clientType})</span>
              </span>
              <div class="lead-meta" style="margin-top: 5px;">
                ${dateHtml}
                ${statusBadge(lead.status)}
                <span><span class="material-icons">store</span> ${lead.branch || 'No Branch'}</span>
                ${arrivalHtml}
              </div>
              <div class="lead-note"><strong>Latest Note:</strong> ${lead.latestConversation}</div>
            </div>
            <div class="lead-actions">
              <span class="material-icons" style="color: var(--primary);">chevron_right</span>
            </div>
          </div>`;
      });
    } else {
      leadsHtml = '<p style="color: var(--text-light); padding: 12px 0;">No leads generated yet.</p>';
    }

    const totalLeads = data.leads ? data.leads.length : 0;
    const regIdRow = data.registrationId
      ? `<div class="ud-row"><div class="ud-label">Registration ID:</div><div class="ud-value">${data.registrationId}</div></div>` : '';

    body.innerHTML = `
      <div class="detail-body">
        <div class="detail-summary">
          <div>
            <div class="detail-eyebrow">Client Profile</div>
            <div style="margin-top: 6px;">
              <span style="font-size: 24px; font-weight: 700; color: var(--primary);">${data.name}</span>
            </div>
            <div class="detail-primary" style="margin-top: 8px;">
              <span class="material-icons">call</span>
              <a href="tel:${data.phone}" style="color: var(--primary); text-decoration: none;">${data.phone}</a>
            </div>
          </div>
          <div class="detail-chip">${totalLeads} lead${totalLeads !== 1 ? 's' : ''}</div>
        </div>

        <div class="ud-meta-grid">
          <div class="ud-row"><div class="ud-label">City:</div><div class="ud-value">${data.city}</div></div>
          <div class="ud-row"><div class="ud-label">First Enquiry:</div><div class="ud-value">${data.enquiryDate}</div></div>
          <div class="ud-row"><div class="ud-label">Original Source:</div><div class="ud-value">${data.source}</div></div>
          ${regIdRow}
        </div>

        ${histHtml ? `<div class="detail-section"><div class="ud-section-title">Edit History</div>${histHtml}</div>` : ''}

        <div class="detail-section">
          <div class="ud-section-title">Generated Leads (${totalLeads})</div>
          <div class="list-container">${leadsHtml}</div>
        </div>
      </div>
    `;
  }

  // --- All Leads ---
  function toggleRegFilter() {
    const statusVal = document.getElementById('al-filter-status').value;
    const regFilterGroup = document.getElementById('al-reg-filter-group');
    if (statusVal === 'Confirmed') {
      regFilterGroup.style.display = 'flex';
    } else {
      regFilterGroup.style.display = 'none';
      document.getElementById('al-filter-reg').value = '';
    }
  }

  function clearAllLeadsFilters() {

  // --- Shared List Render ---
  function renderLeadsList(containerId, leads) {
    const container = document.getElementById(containerId);
    if (leads.length === 0) {
      container.innerHTML = '<p style="color:var(--text-light)">No records found matching criteria.</p>';
      return;
    }

    let html = '';
    leads.forEach(lead => {
      let regIdHtml = lead.registrationId ? `<span><span class="material-icons">badge</span> ${lead.registrationId}</span>` : '';
      let arrivalHtml = (lead.clientType === 'Returning' && lead.arrivalStatus) ? `<span><span class="material-icons">directions_walk</span> ${lead.arrivalStatus}</span>` : '';
      const dateHtml = leadDateHtml(lead);
      html += `
        <div class="lead-item">
          <div class="lead-info">
            <span class="lead-name" onclick="openUserDetail(${lead.rowIndex})">${lead.name}</span>
            <div class="lead-meta">
              <span><span class="material-icons">phone</span> <a href="tel:${lead.phone}" style="color: inherit; text-decoration: none;">${lead.phone}</a></span>
              <span><span class="material-icons">location_on</span> ${lead.city}</span>
              ${dateHtml}
              ${statusBadge(lead.status)}
              ${regIdHtml}
              ${arrivalHtml}
            </div>
            <div class="lead-note">
              <strong>Latest Note:</strong> ${lead.latestConversation}
            </div>
          </div>
          <div class="lead-actions" style="margin-left: 15px;">
            <a href="tel:${lead.phone}" class="btn btn-primary" style="display: inline-flex; align-items: center; justify-content: center; padding: 10px; border-radius: 50%;">
              <span class="material-icons" style="font-size: 20px; margin: 0;">call</span>
            </a>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  function renderPagination(containerId, currentPage, totalPages, fetchFuncStr) {
    if (totalPages <= 1) return;
    const container = document.getElementById(containerId);
    let html = '';
    
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="${fetchFuncStr}(${currentPage - 1})">Prev</button>`;
    
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="${fetchFuncStr}(${i})">${i}</button>`;
      } else if (i === currentPage - 3 || i === currentPage + 3) {
        html += `<span style="padding: 6px;">...</span>`;
      }
    }
    
    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="${fetchFuncStr}(${currentPage + 1})">Next</button>`;
    
    container.innerHTML = html;
  }

  // --- Lead Detail Page (replaces overlay) ---
  function openLeadDetailPage(rowIndex, shouldPushState = true) {
    currentDetailRowIndex = rowIndex;
    // Remember which section we came from
    const fromSection = getActiveSectionId();
    if (fromSection !== 'lead-detail-section') {
      previousSectionId = fromSection;
    }
    
    // Navigate to lead-detail-section as a real page section
    showSection('lead-detail-section', null, false);
    
    // Scroll to top of main content area
    const mainContent = document.getElementById('main-content-area');
    if (mainContent) mainContent.scrollTop = 0;
    window.scrollTo(0, 0);
    
    document.getElementById('ld-page-body').innerHTML = '<div class="loading">Loading details...</div>';
    
    if (shouldPushState) pushAppState({ section: 'lead-detail-section', rowIndex: rowIndex });

    google.script.run
      .withSuccessHandler(renderUserDetail)
      .withFailureHandler(function(error) {
        document.getElementById('ld-page-body').innerHTML = `<div class="detail-body"><div class="message error" style="display:block;">Error loading lead: ${error.message}</div></div>`;
      })
      .getUserDetails(rowIndex);
  }

  // Keep backward-compat alias so any other calls still work
  function openUserDetail(rowIndex, shouldPushState = true) {
    openLeadDetailPage(rowIndex, shouldPushState);
  }

  function closeLeadDetailPage(syncHistory = true) {
    currentDetailRowIndex = null;
    // Refresh the list we came from
    if (previousSectionId === 'all-leads-section') {
      showSection('all-leads-section', null, false);
      fetchAllLeads(document.querySelector('#al-pagination .active') ? parseInt(document.querySelector('#al-pagination .active').textContent) : 1);
    } else if (previousSectionId === 'today-calls-section') {
      showSection('today-calls-section', null, false);
      fetchTodayCalls(document.querySelector('#tc-pagination .active') ? parseInt(document.querySelector('#tc-pagination .active').textContent) : 1);
    } else if (previousSectionId === 'client-detail-section') {
      // came from inside client detail — just go back
      if (currentClientDetailId) {
        openClientDetail(currentClientDetailId, false);
      } else {
        showSection('clients-section', null, false);
      }
    } else {
      showSection(previousSectionId || 'dashboard-section', null, false);
    }
    if (syncHistory && history.state && history.state.section === 'lead-detail-section') {
      history.back();
    }
  }

  function toggleDetailRegId(clientType) {
    const status = document.getElementById('ud-update-status').value;
    const regGroup = document.getElementById('ud-regid-group');
    const arrGroup = document.getElementById('ud-arrival-group');
    
    // New leads: reg ID is always visible (regardless of status)

      regGroup.style.display = 'block';
    } else {
      regGroup.style.display = 'none';
    }
    
    // Arrival status (Reached / Closed) shown when Confirmed — for both New and Returning

  function handleDeleteLead(btn) {
    if (!currentDetailRowIndex || !isCurrentUserAdmin) return;
    
    if (confirm('Are you sure you want to permanently delete this lead? This action cannot be undone.')) {
      btn.disabled = true;
      btn.textContent = 'Deleting...';
      
      google.script.run
        .withSuccessHandler(function(response) {
           closeLeadDetailPage();
           alert('Lead deleted successfully');
        })
        .withFailureHandler(function(error) {
           btn.disabled = false;
           btn.textContent = 'Delete Lead';
           alert('Error deleting lead: ' + error.message);
        })
        .deleteLead(currentDetailRowIndex, currentUsername);
    }

  function saveUserDetailConversation(btn) {
    if (!currentDetailRowIndex) return;
    
    const textArea = document.getElementById('ud-new-conv');
    const text = textArea.value.trim();
    
    const status = document.getElementById('ud-update-status').value;
    const originalStatus = document.getElementById('disp-status').getAttribute('data-original-status');
    const branch = document.getElementById('ud-update-branch').value;
    const cad = document.getElementById('ud-update-cad').value;
    
    // Safely retrieve elements that might be conditionally hidden
    const regidEl = document.getElementById('ud-update-regid');
    const regid = regidEl ? regidEl.value : '';
    
    const arrivalEl = document.getElementById('ud-update-arrival');
    const arrivalStatus = arrivalEl ? arrivalEl.value : '';

    // Name and City edits
    const nameInput = document.getElementById('ud-edit-name');
    const name = nameInput ? nameInput.value.trim() : null;
    const pageBody = document.getElementById('ld-page-body');
    const originalName = pageBody ? pageBody.getAttribute('data-original-name') : null;
    
    const cityInput = document.getElementById('ud-edit-city');
    const city = cityInput ? cityInput.value.trim() : null;
    const originalCity = document.getElementById('disp-city').getAttribute('data-original-city');

    const clientType = document.getElementById('ud-update-status').getAttribute('data-client-type') || 'New';
    
    if (status === 'Confirmed') {
      if (!branch) {
        return alert('Please select a Branch when confirming a lead.');
      }
      // Arrival status is optional — no longer required
    }

    btn.disabled = true;
    btn.textContent = 'Saving...';
    
    const clientRowFromPage = pageBody ? pageBody.getAttribute('data-client-row') : null;

    google.script.run
      .withSuccessHandler(function(response) {
        btn.disabled = false;
        btn.textContent = 'Update';
        textArea.value = '';
        
        // Update display text in place
        if(response.status) {
          document.getElementById('disp-status').innerHTML = statusBadge(response.status);
          document.getElementById('disp-status').setAttribute('data-original-status', response.status);
        }
        if(response.branch !== undefined) document.getElementById('disp-branch').textContent = response.branch || 'N/A';
        if(response.contactAgainDate !== undefined) document.getElementById('disp-cad').textContent = response.contactAgainDate || 'None';
        if(response.registrationId !== undefined) document.getElementById('disp-regid').textContent = response.registrationId || 'None';
        if(response.name && pageBody) pageBody.setAttribute('data-original-name', response.name);
        if(response.city) document.getElementById('disp-city').setAttribute('data-original-city', response.city);

        const cRow = currentDetailRowIndex;
        openLeadDetailPage(cRow, false);
      })
      .withFailureHandler(function(error) {
        btn.disabled = false;
        btn.textContent = 'Update';
        alert('Error saving: ' + error.message);
      })
      .addConversation(currentDetailRowIndex, text, currentUser, status, branch, cad, regid, originalStatus, name, city, originalName, originalCity, clientRowFromPage, arrivalStatus);
  }

  // --- Add Lead Flow (New vs Existing) ---
  function resetAddDataFlow() {
    document.getElementById('phone-check-container').style.display = 'block';
    document.getElementById('existing-client-container').style.display = 'none';
    document.getElementById('new-client-container').style.display = 'none';
    
    document.getElementById('check-phone').value = '';
    document.getElementById('verify-message').style.display = 'none';
    
    document.getElementById('add-lead-existing-form').reset();
    document.getElementById('existing-message').style.display = 'none';
    
    document.getElementById('add-data-form').reset();
    document.getElementById('add-message').style.display = 'none';
  }

  function verifyClientPhone() {
    const phone = document.getElementById('check-phone').value.trim();
    if (!phone) return alert('Please enter a phone number to check.');
    if (!/^\d{10}$/.test(phone)) return alert('Phone number must be exactly 10 digits.');
    
    const btn = document.getElementById('verify-phone-btn');
    const msg = document.getElementById('verify-message');
    
    btn.disabled = true;
    btn.textContent = 'Checking...';
    msg.style.display = 'none';
    
    google.script.run
      .withSuccessHandler(function(response) {
        btn.disabled = false;
        btn.textContent = 'Check Client';
        
        document.getElementById('phone-check-container').style.display = 'none';
        
        if (response.exists) {
          const c = response.client;
          document.getElementById('existing-client-container').style.display = 'block';
          document.getElementById('existing-clientId').value = c.clientId;
          document.getElementById('existing-client-details').innerHTML = `
            <strong>Name:</strong> ${c.name} <br>
            <strong>City:</strong> ${c.city} <br>
            <strong>Phone:</strong> ${c.phone} <br>
            <strong>First Enq Date:</strong> ${c.enqDate}
          `;
          
          // Pre-fill today's date for convenience
          document.getElementById('ex-enquiryDate').valueAsDate = new Date();
          
        } else {
          document.getElementById('new-client-container').style.display = 'block';
          document.getElementById('phone').value = phone; // Pre-fill phone
          document.getElementById('enquiryDate').valueAsDate = new Date(); // Pre-fill date
        }
      })
      .withFailureHandler(function(error) {
        btn.disabled = false;
        btn.textContent = 'Check Client';
        msg.className = 'message error';
        msg.textContent = 'Error: ' + error.message;
        msg.style.display = 'block';
      })
      .checkPhoneExists(phone);
  }

  function handleAddLeadExisting(event) {
    event.preventDefault();
    const btn = document.getElementById('submit-existing-btn');
    const msgDiv = document.getElementById('existing-message');
    
    const clientId = document.getElementById('existing-clientId').value;
    const data = {
      enquiryDate: document.getElementById('ex-enquiryDate').value,
      leadBy: document.getElementById('ex-leadBy').value,
      source: document.getElementById('ex-source').value
    };
    
    btn.disabled = true;
    btn.textContent = 'Saving...';
    msgDiv.style.display = 'none';
    
    google.script.run
      .withSuccessHandler(function(response) {
        msgDiv.className = 'message success';
        msgDiv.textContent = response.message;
        msgDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Lead for Client';
        setTimeout(() => resetAddDataFlow(), 2000);
      })
      .withFailureHandler(function(error) {
        msgDiv.className = 'message error';
        msgDiv.textContent = 'Error: ' + error.message;
        msgDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Lead for Client';
      })
      .addLeadForExistingClient(clientId, data);
  }

  function handleFormSubmit(event) {
    event.preventDefault();
    const btn = document.getElementById('submit-btn');
    const msgDiv = document.getElementById('add-message');
    
    btn.disabled = true;
    btn.textContent = 'Saving...';
    msgDiv.className = 'message';
    msgDiv.textContent = '';
    msgDiv.style.display = 'none';

    const form = document.getElementById('add-data-form');
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    google.script.run
      .withSuccessHandler(function(response) {
        if(response.success) {
          msgDiv.className = 'message success';
          msgDiv.textContent = response.message;
          msgDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Save Client';
          setTimeout(() => resetAddDataFlow(), 2000);
        } else {
          msgDiv.className = 'message error';
          msgDiv.textContent = response.message;
          msgDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Save Client';
        }
      })
      .withFailureHandler(function(error) {
        msgDiv.className = 'message error';
        msgDiv.textContent = 'Error: ' + error.message;
        msgDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Save Client';
      })
      .addCustomer(data);
  }

  // --- Inactivity Detection & Session Keep-Alive ---
  function clearInactivityTimers() {
    if (inactivityWarningTimer) { clearTimeout(inactivityWarningTimer); inactivityWarningTimer = null; }
    if (inactivityLogoutTimer)  { clearTimeout(inactivityLogoutTimer);  inactivityLogoutTimer  = null; }
    const toast = document.getElementById('session-warning-toast');
    if (toast) toast.style.display = 'none';
  }

  function startInactivityTimer() {
    clearInactivityTimers();
    if (!currentUser) return;

    inactivityWarningTimer = setTimeout(function() {
      const toast = document.getElementById('session-warning-toast');
      if (toast) { toast.style.display = 'flex'; }
    }, INACTIVITY_WARNING_MS);

    inactivityLogoutTimer = setTimeout(function() {
      const toast = document.getElementById('session-warning-toast');
      if (toast) toast.style.display = 'none';
      logout();
    }, INACTIVITY_LOGOUT_MS);
  }

  function resetInactivityTimer() {
    if (!currentUser) return;
    startInactivityTimer();
  }

  function keepSessionAlive() {
    // Hide warning and reset the timer
    const toast = document.getElementById('session-warning-toast');
    if (toast) toast.style.display = 'none';
    // Ping the server to keep Google Apps Script session alive
    google.script.run
      .withSuccessHandler(function() { startInactivityTimer(); })
      .withFailureHandler(function() { startInactivityTimer(); })
      .ping();
  }

  // Attach activity listeners once the page loads
  (function initActivityListeners() {
    const events = ['click', 'keydown', 'touchstart', 'scroll', 'mousemove'];
    let debounceTimer = null;
    function onActivity() {
      if (!currentUser) return;
      if (debounceTimer) return; // debounce to avoid hammering
      debounceTimer = setTimeout(function() {
        debounceTimer = null;
        resetInactivityTimer();
      }, 1000);
    }
    events.forEach(function(evt) {
      document.addEventListener(evt, onActivity, { passive: true });
    });
  })();

  // Click outside / blank space to close/collapse sidebar
  document.addEventListener('click', function(event) {
    const sidebar = document.getElementById('sidebar');
    if (!sidebar) return;
    
    const isMobile = window.innerWidth <= 768;
    const isSidebarOpen = isMobile ? sidebar.classList.contains('open') : !sidebar.classList.contains('collapsed');
    if (!isSidebarOpen) return;
    
    const toggleBtn = document.querySelector('.sidebar-toggle');
    const mobileToggleBtn = document.querySelector('.mobile-menu-btn');
    if (toggleBtn && (toggleBtn === event.target || toggleBtn.contains(event.target))) return;
    if (mobileToggleBtn && (mobileToggleBtn === event.target || mobileToggleBtn.contains(event.target))) return;
    
    const clickedInsideSidebar = sidebar.contains(event.target);
    if (clickedInsideSidebar) {
      const clickedNavLink = event.target.closest('.nav-links li');
      if (!clickedNavLink) {
        if (isMobile) {
          closeSidebar();
        } else {
          sidebar.classList.add('collapsed');
        }
      }
    } else {
      if (isMobile) {
        closeSidebar();
      } else {
        sidebar.classList.add('collapsed');
      }
    }
  });

</script>
